name: CI

# Runs on every push and PR to main. The deploy job only runs on a push to main
# AND only if the test job passes — so broken code can't reach live pilots.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # Dummy creds so modules import without secrets. The offline tests do NO
    # network I/O — clients are built lazily, nothing connects at import.
    env:
      OPENAI_API_KEY: test
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: test
      TELEGRAM_BOT_TOKEN: test
      QUERY_LOG_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Match Render's runtime so version-specific bugs surface here, not live.
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile all modules (syntax)
        run: python -m compileall -q .

      - name: Import entry points (catches import/wiring errors)
        # This step alone would have caught several of our past breakages.
        run: |
          python -c "import main"
          python -c "import e2e"
          python -c "import harness"

      - name: Offline unit tests (deterministic safety-critical paths)
        run: pytest test_offline.py -q

  deploy:
    # Gate: only after tests pass, only on a real push to main.
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        # Requires repo secret RENDER_DEPLOY_HOOK (Render → service → Settings →
        # Deploy Hook). Render auto-deploy MUST be turned OFF, or it will deploy
        # on push regardless of this gate.
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
